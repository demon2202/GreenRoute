name: Keep Backend Warm

on:
  schedule:
    # Runs every 12 minutes (Render free tier spins down after 15 minutes of inactivity)
    - cron: '*/12 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sL https://greenroute-backend-syxi.onrender.com/health
